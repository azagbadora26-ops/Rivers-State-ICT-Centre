<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Rivers State ICT Centre</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="subpage">
    <header>
        <nav class="navbar">
            <h1>Rivers ICT Centre</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="programs.html">Programs</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact" id="contact">
            <h2>Contact Us</h2>
            <div class="stage">
            <div class="box">
                <p><strong>Address:</strong> Port Harcourt, Rivers State</p>
                <p><strong>Phone:</strong> +234 800 000 0000</p>
                <p><strong>Email:</strong> info@riversictcentre.com</p>
            </div>  
            <div class="box">
                <h3>Send Us a Message</h3>
                <form id="contactForm">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Your Email" required>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Your Message" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Rivers State ICT Centre</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
